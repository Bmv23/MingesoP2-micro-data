server:
  port: 8090
  
eureka:
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      default-zone: http://localhost:8761/eureka
  instance:
    hostname: localhost

spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      routes:
        - id: micro-user
          uri: lb://micro-user
          predicates:
            - Path=/api/v0/users/**
        - id: micro-package
          uri: lb://micro-package
          predicates:
            - Path=/api/v0/packages/**